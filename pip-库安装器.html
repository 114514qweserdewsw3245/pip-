<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>pip 库安装器</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
:root{
  --bg:#fafafa; --panel:#fff; --border:#e4e4e7; --text:#27272a;
  --muted:#71717a; --accent:#2563eb; --accent-hover:#1d4ed8;
  --soft:#f4f4f5; --warn:#f59e0b; --danger:#dc2626;
}
[data-theme="dark"]{
  --bg:#18181b; --panel:#27272a; --border:#3f3f46; --text:#fafafa;
  --muted:#a1a1aa; --accent:#3b82f6; --accent-hover:#60a5fa;
  --soft:#3f3f46; --warn:#fbbf24; --danger:#ef4444;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font:14px/1.5 "Microsoft YaHei",system-ui,sans-serif;
  background:var(--bg);color:var(--text);padding:16px;
}
.wrap{max-width:1180px;margin:0 auto}
header{
  display:flex;align-items:center;gap:12px;
  padding:8px 4px 14px;border-bottom:1px solid var(--border);margin-bottom:14px;
}
header h1{font-size:18px;font-weight:600}
header .sub{color:var(--muted);font-size:12px}
header .right{margin-left:auto;display:flex;gap:8px;align-items:center}
.icon-btn{
  background:none;border:1px solid var(--border);border-radius:6px;
  padding:6px 10px;cursor:pointer;color:var(--text);font-size:13px;
}
.icon-btn:hover{background:var(--soft)}
.bar{
  display:flex;gap:8px;flex-wrap:wrap;align-items:center;
  padding:10px;background:var(--panel);border:1px solid var(--border);
  border-radius:8px;margin-bottom:12px;
}
.bar label{font-size:12px;color:var(--muted)}
.bar select,.bar input{
  padding:6px 10px;border:1px solid var(--border);border-radius:6px;
  background:var(--bg);color:var(--text);font-size:13px;outline:none;
}
.bar input{flex:1;min-width:180px}
.layout{display:grid;grid-template-columns:200px 1fr 280px;gap:12px}
@media(max-width:900px){.layout{grid-template-columns:1fr}}
.box{
  background:var(--panel);border:1px solid var(--border);
  border-radius:8px;padding:10px;
}
.cats{max-height:70vh;overflow:auto}
.cat{
  padding:8px 10px;cursor:pointer;border-radius:6px;
  font-size:13px;display:flex;justify-content:space-between;align-items:center;
}
.cat:hover{background:var(--soft)}
.cat.on{background:var(--accent);color:#fff}
.cat .n{font-size:11px;opacity:.7}
.list{max-height:70vh;overflow:auto}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:8px}
.card{
  border:1px solid var(--border);border-radius:6px;padding:10px;
  display:flex;flex-direction:column;gap:6px;background:var(--bg);
}
.card .top{display:flex;align-items:center;gap:6px}
.card .name{font-weight:600;font-size:14px;flex:1;word-break:break-all}
.card .star{cursor:pointer;color:var(--muted);font-size:16px;line-height:1}
.card .star.on{color:var(--warn)}
.card .desc{color:var(--muted);font-size:12px;min-height:18px}
.card .actions{display:flex;gap:4px;flex-wrap:wrap;margin-top:2px}
.btn{
  border:1px solid var(--border);background:var(--bg);color:var(--text);
  padding:4px 8px;border-radius:5px;cursor:pointer;font-size:12px;flex:1;
}
.btn:hover{background:var(--soft)}
.btn.p{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn.p:hover{background:var(--accent-hover)}
.cart-title{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.cart-title h3{font-size:14px;font-weight:600}
.cart-list{max-height:300px;overflow:auto;margin:6px 0}
.cart-item{
  display:flex;justify-content:space-between;align-items:center;
  padding:5px 8px;background:var(--soft);border-radius:5px;margin-bottom:4px;
  font-size:13px;
}
.cart-item .rm{cursor:pointer;color:var(--danger);font-size:16px;line-height:1}
.cart-empty{color:var(--muted);font-size:12px;text-align:center;padding:20px}
.cart-actions{display:flex;flex-direction:column;gap:6px}
.h2{font-size:15px;font-weight:600;margin:4px 0 10px;display:flex;align-items:center;gap:8px}
.h2 .num{color:var(--muted);font-size:12px;font-weight:normal}
.tip{
  padding:8px 12px;background:var(--soft);border-left:3px solid var(--warn);
  border-radius:4px;margin-bottom:12px;font-size:12px;color:var(--muted);line-height:1.6;
}
.tip a{color:var(--accent);text-decoration:none}
.tip a:hover{text-decoration:underline}
.toast{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  background:var(--text);color:var(--bg);padding:9px 18px;border-radius:6px;
  font-size:13px;opacity:0;transition:opacity .25s;pointer-events:none;z-index:99;
}
.toast.on{opacity:1}
.custom-row{display:flex;gap:6px;margin-bottom:10px}
.custom-row input{flex:1}
.empty{text-align:center;padding:40px;color:var(--muted);font-size:13px}
.dot{
  display:inline-block;width:6px;height:6px;border-radius:50%;
  background:var(--warn);margin-left:4px;vertical-align:middle;
}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>pip 库安装器</h1>
    <span class="sub">v0.3 · 本地工具</span>
    <div class="right">
      <button class="icon-btn" id="envBtn" title="生成一个 Python 环境检测脚本">环境检测</button>
      <button class="icon-btn" id="themeBtn" title="切换主题">🌓</button>
    </div>
  </header>

  <div class="tip">
    挑库 → 加入安装清单 → 下载 bat → 双击运行就行。
    如果 bat 跑起来报错 <code>不是内部或外部命令</code>,先用右上角"环境检测"看看 Python 是不是装好了。
  </div>

  <div class="bar">
    <label>镜像:</label>
    <select id="mirror">
      <option value="https://pypi.tuna.tsinghua.edu.cn/simple">清华</option>
      <option value="https://mirrors.aliyun.com/pypi/simple/">阿里</option>
      <option value="https://pypi.mirrors.ustc.edu.cn/simple/">中科大</option>

      <option value="">官方源</option>

    <label>Python:</label>

      <option value="python">python</option>
      <option value="py">py</option>
      <option value="python3">python3</option>
    </select>
    <input id="search" placeholder="搜库名/中文描述,比如 爬虫、torch">
  </div>

  <div class="layout">
    <div class="box cats" id="cats"></div>
    <div class="box list" id="list"></div>
    <div class="box">
      <div class="cart-title">
        <h3>安装清单 <span class="num" id="cartNum">0</span></h3>
        <button class="icon-btn" id="clearCart" style="padding:2px 8px;font-size:11px">清空</button>
      </div>
      <div class="custom-row">
        <input id="customLib" placeholder="加自定义库,例如 requests==2.31.0">
        <button class="btn p" id="addCustom" style="flex:0 0 auto">加入</button>
      </div>
      <div class="cart-list" id="cartList"></div>
      <div class="cart-actions">
        <button class="btn p" id="dlAll">下载安装脚本 (bat)</button>
        <button class="btn" id="dlUninstall">下载卸载脚本</button>
        <button class="btn" id="copyAll">复制全部命令</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

// ====== 状态 ======
const $ = id => document.getElementById(id);
const LS = {
  get: k => { try{return JSON.parse(localStorage.getItem(k))}catch(e){return null} },
  set: (k,v) => localStorage.setItem(k, JSON.stringify(v))
};

let cart = LS.get('cart') || [];
let favs = LS.get('favs') || [];
let currentCat = Object.keys(data)[0];

// 主题
const theme = LS.get('theme') || (matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light');
document.documentElement.setAttribute('data-theme', theme);
$('themeBtn').onclick = () => {
  const t = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', t);
  LS.set('theme', t);
};

// 镜像、python 命令记忆
$('mirror').value = LS.get('mirror') ?? $('mirror').value;
$('pycmd').value = LS.get('pycmd') ?? 'python';
$('mirror').onchange = () => LS.set('mirror', $('mirror').value);
$('pycmd').onchange = () => LS.set('pycmd', $('pycmd').value);

// ====== 工具函数 ======
function toast(msg){
  const t = $('toast'); t.textContent = msg; t.classList.add('on');
  clearTimeout(toast._t); toast._t = setTimeout(()=>t.classList.remove('on'), 1800);
}

function pipCmd(lib, action='install'){
  const py = $('pycmd').value;
  const m = $('mirror').value;
  const flag = action === 'install' ? 'install' : 'uninstall -y';
  return `${py} -m pip ${flag} ${lib}` + (action==='install' && m ? ` -i ${m}` : '');
}

function makeBat(libs, action='install'){
  // 写 bat 文件,加点防呆
  const title = action === 'install' ? '安装' : '卸载';
  const lines = [
    '@echo off',
    'chcp 65001 >nul',
    `title ${title} Python 库`,
    'color 0A',
    `echo === ${title}清单 (${libs.length} 个) ===`,
    'echo.',
    `where ${$('pycmd').value} >nul 2>nul`,
    'if errorlevel 1 (',
    '    echo [错误] 找不到 Python,请先装 Python 并勾选 Add to PATH',
    '    pause & exit /b 1',
    ')',
    'echo.'
  ];
  libs.forEach((lib, i) => {
    lines.push(`echo [${i+1}/${libs.length}] ${title} ${lib} ...`);
    lines.push(pipCmd(lib, action));
    lines.push('echo.');
  });
  lines.push(`echo === 全部完成 ===`);
  lines.push('pause');
  return lines.join('\r\n');
}

function downloadFile(name, content){
  const blob = new Blob(['\uFEFF'+content], {type:'text/plain;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = name;
  a.click();
  setTimeout(()=>URL.revokeObjectURL(url), 500);
}

function copy(text){
  navigator.clipboard?.writeText(text).then(
    ()=>toast('已复制'),
    ()=>{ // fallback
      const ta = document.createElement('textarea');
      ta.value = text; document.body.appendChild(ta);
      ta.select(); document.execCommand('copy'); ta.remove();
      toast('已复制');
    }
  );
}

// ====== 渲染 ======
function renderCats(){
  const html = ['<div class="cat'+(currentCat==='__fav__'?' on':'')+'" data-cat="__fav__">★ 收藏 <span class="n">'+favs.length+'</span></div>'];
  Object.keys(data).forEach(c => {
    html.push(`<div class="cat${c===currentCat?' on':''}" data-cat="${c}">${c} <span class="n">${data[c].length}</span></div>`);
  });
  $('cats').innerHTML = html.join('');
  $('cats').querySelectorAll('.cat').forEach(el => {
    el.onclick = () => { currentCat = el.dataset.cat; $('search').value=''; renderCats(); renderList(); };
  });
}

function renderList(){
  const q = $('search').value.trim().toLowerCase();
  let title, items;
  if(q){
    title = '搜索 "'+q+'"';
    items = [];
    Object.entries(data).forEach(([c, arr]) => {
      arr.forEach(([n,d]) => {
        if(n.toLowerCase().includes(q) || d.toLowerCase().includes(q) || c.toLowerCase().includes(q))
          items.push([n,d,c]);
      });
    });
  } else if(currentCat === '__fav__'){
    title = '收藏';
    items = favs.map(n => {
      // 找出原描述
      for(const [c,arr] of Object.entries(data))
        for(const [nn,d] of arr) if(nn===n) return [n,d,c];
      return [n,'(自定义)','自定义'];
    });
  } else {
    title = currentCat;
    items = data[currentCat].map(([n,d]) => [n,d,currentCat]);
  }

  if(!items.length){
    $('list').innerHTML = `<div class="h2">${title}</div><div class="empty">没东西</div>`;
    return;
  }

  const cards = items.map(([n,d,c]) => {
    const inCart = cart.includes(n);
    const isFav = favs.includes(n);
    return `<div class="card">
      <div class="top">
        <div class="name">${n}</div>
        <span class="star ${isFav?'on':''}" data-fav="${n}" title="收藏">${isFav?'★':'☆'}</span>
      </div>
      <div class="desc">${d}${q?' · '+c:''}</div>
      <div class="actions">
        <button class="btn ${inCart?'':'p'}" data-add="${n}">${inCart?'已加入':'加入清单'}</button>
        <button class="btn" data-copy="${n}" title="复制单条命令">复制</button>
      </div>
    </div>`;
  }).join('');

  $('list').innerHTML = `<div class="h2">${title} <span class="num">${items.length} 个</span></div><div class="grid">${cards}</div>`;

  // 绑事件
  $('list').querySelectorAll('[data-add]').forEach(b => b.onclick = () => addCart(b.dataset.add));
  $('list').querySelectorAll('[data-copy]').forEach(b => b.onclick = () => copy(pipCmd(b.dataset.copy)));
  $('list').querySelectorAll('[data-fav]').forEach(b => b.onclick = () => toggleFav(b.dataset.fav));
}

function renderCart(){
  $('cartNum').textContent = cart.length;
  if(!cart.length){
    $('cartList').innerHTML = '<div class="cart-empty">还没添加任何库</div>';
    return;
  }
  $('cartList').innerHTML = cart.map(n =>
    `<div class="cart-item"><span>${n}</span><span class="rm" data-rm="${n}">×</span></div>`
  ).join('');
  $('cartList').querySelectorAll('[data-rm]').forEach(el =>
    el.onclick = () => { cart = cart.filter(x => x !== el.dataset.rm); LS.set('cart',cart); renderCart(); renderList(); }
  );
}

function addCart(lib){
  if(cart.includes(lib)){ toast(lib+' 已经在清单里了'); return; }
  cart.push(lib); LS.set('cart',cart);
  renderCart(); renderList();
  toast('已加入: '+lib);
}

function toggleFav(lib){
  if(favs.includes(lib)) favs = favs.filter(x => x !== lib);
  else favs.push(lib);
  LS.set('favs', favs);
  renderCats(); renderList();
}

// ====== 顶部按钮 ======
$('search').oninput = renderList;

$('clearCart').onclick = () => {
  if(!cart.length) return;
  if(confirm('清空整个安装清单?')){ cart=[]; LS.set('cart',cart); renderCart(); renderList(); }
};

$('addCustom').onclick = () => {
  const v = $('customLib').value.trim();
  if(!v) return;
  // 简单过滤,不允许带空格危险字符
  if(/[<>|&;`$]/.test(v)){ toast('库名有非法字符'); return; }
  addCart(v);
  $('customLib').value = '';
};
$('customLib').addEventListener('keydown', e => { if(e.key==='Enter') $('addCustom').click(); });

$('dlAll').onclick = () => {
  if(!cart.length){ toast('清单是空的'); return; }
  const stamp = new Date().toISOString().slice(0,10).replace(/-/g,'');
  downloadFile(`安装_${cart.length}个库_${stamp}.bat`, makeBat(cart,'install'));
  toast('已生成安装脚本');
};

$('dlUninstall').onclick = () => {
  if(!cart.length){ toast('清单是空的'); return; }
  if(!confirm('确认要生成卸载脚本吗?跑这个 bat 会把清单里的库都卸了')) return;
  downloadFile(`卸载_${cart.length}个库.bat`, makeBat(cart,'uninstall'));
};

$('copyAll').onclick = () => {
  if(!cart.length){ toast('清单是空的'); return; }
  copy(cart.map(n => pipCmd(n)).join('\r\n'));
};

$('envBtn').onclick = () => {
  // 给新手用,跑完能看到自己 python 是否正常
  const py = $('pycmd').value;
  const bat = [
    '@echo off',
    'chcp 65001 >nul',
    'title Python 环境检测',
    'color 0E',
    'echo === Python 环境检测 ===',
    'echo.',
    'echo [1] 检查 python 命令...',
    `where ${py}`,
    'echo.',
    'echo [2] 检查版本...',
    `${py} --version`,
    'echo.',
    'echo [3] 检查 pip...',
    `${py} -m pip --version`,
    'echo.',
    'echo [4] 已安装的库 (前 30 个):',
    `${py} -m pip list 2>nul | more +0`,
    'echo.',
    'echo === 检测完成 ===',
    'echo 把上面的内容截图发给求助的人',
    'pause'
  ].join('\r\n');
  downloadFile('检测Python环境.bat', bat);
  toast('环境检测脚本已下载');
};

// ====== 启动 ======
renderCats(); renderList(); renderCart();
</script>
</body>
</html>
